name: Release arm64 Windows

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.2.3, must already exist)"
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

concurrency:
  group: windows-release-${{ inputs.tag }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  desktop-package-windows:
    name: desktop-package (Windows)
    runs-on: windows-11-arm
    env:
      TAG: ${{ inputs.tag }}
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - uses: ./.github/actions/setup
      - name: Cache Electron artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-electron-
      - name: Build
        run: pnpm build
      - name: Runtime validation
        run: pnpm test:runtime
      - name: Generate desktop notices
        run: pnpm --filter @repo-edu/release license-gate --app desktop --platform windows-arm64 --artifact-targets nsis --manifest-out apps/desktop/release-notices/RepoEdu-third-party-notices-desktop-windows-arm64.txt
      - name: Package
        run: pnpm --filter @repo-edu/desktop exec electron-builder --config electron-builder.json --win nsis --arm64 --publish never
      - name: Rename update metadata for arm64
        shell: bash
        run: mv apps/desktop/release/latest.yml apps/desktop/release/latest-windows-arm64.yml
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-windows-arm64
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest-windows-arm64.yml
            apps/desktop/release-notices/*.txt
          retention-days: 30

  release-attach:
    name: release-attach
    needs:
      - desktop-package-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download desktop artifact
        uses: actions/download-artifact@v8
        with:
          name: desktop-windows-arm64
          path: artifacts/desktop-windows-arm64

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          files: artifacts/**/*
