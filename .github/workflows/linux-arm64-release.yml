name: Release arm64 Linux

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to build (default: current ref)"
        required: false
        type: string
      publish:
        description: "Attach artifacts to a GitHub Release"
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      publish:
        required: false
        default: true
        type: boolean

concurrency:
  group: linux-release-${{ inputs.ref || inputs.tag || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TARGET_REF: ${{ inputs.ref || inputs.tag || github.ref }}

jobs:
  desktop-package-linux:
    name: desktop-package (Linux)
    runs-on: ubuntu-24.04-arm
    env:
      TAG: ${{ inputs.ref || inputs.tag || github.ref }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TARGET_REF }}
      - uses: ./.github/actions/setup
      - name: Cache Electron artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-electron-
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Build
        run: pnpm build
      - name: Runtime validation
        run: xvfb-run -a pnpm test:runtime
      - name: Generate desktop notices
        run: pnpm --filter @repo-edu/release license-gate --app desktop --platform linux-arm64 --artifact-targets AppImage,deb --manifest-out apps/desktop/release-notices/RepoEdu-third-party-notices-desktop-linux-arm64.txt
      - name: Package
        run: pnpm --filter @repo-edu/desktop exec electron-builder --config electron-builder.json --linux AppImage deb --arm64 --publish never
      - name: Verify Linux arm64 update metadata
        shell: bash
        run: |
          shopt -s nullglob
          metadata_files=(apps/desktop/release/*-linux-arm64.yml)
          if [ "${#metadata_files[@]}" -eq 0 ]; then
            echo "::error::Expected Linux arm64 update metadata (*-linux-arm64.yml) was not generated"
            ls -la apps/desktop/release
            exit 1
          fi
          printf "Found update metadata: %s\n" "${metadata_files[@]}"
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-linux-arm64
          path: |
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/*.blockmap
            apps/desktop/release/*-linux-arm64.yml
            apps/desktop/release-notices/*.txt
          retention-days: 30

  cli-build-linux:
    name: cli-build (linux-arm64)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TARGET_REF }}

      - uses: ./.github/actions/setup

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Build CLI workspace dependencies
        run: pnpm build:types

      - name: Compile CLI binary
        run: |
          pnpm exec bun build --compile \
            apps/cli/src/main.ts \
            --outfile redu-linux-arm64

      - name: Smoke test
        run: ./redu-linux-arm64 --version

      - name: Generate CLI notices
        run: pnpm --filter @repo-edu/release license-gate --app cli --platform linux-arm64 --artifact-targets binary --manifest-out redu-linux-arm64.third-party-notices.txt

      - name: Generate CLI checksum
        run: |
          node -e '
            const { createHash } = require("node:crypto")
            const { readFileSync, writeFileSync } = require("node:fs")
            const paths = process.argv.slice(1)
            const lines = paths.map((path) => {
              const digest = createHash("sha256")
                .update(readFileSync(path))
                .digest("hex")
              return `${digest}  ${path}\n`
            })
            writeFileSync(`${paths[0]}.sha256`, lines.join(""))
          ' redu-linux-arm64 redu-linux-arm64.third-party-notices.txt

      - name: Upload CLI binary
        uses: actions/upload-artifact@v7
        with:
          name: cli-linux-arm64
          path: |
            redu-linux-arm64
            redu-linux-arm64.sha256
            redu-linux-arm64.third-party-notices.txt
          retention-days: 30

  release-attach:
    name: release-attach
    if: ${{ inputs.publish && (inputs.tag || inputs.ref) }}
    needs:
      - desktop-package-linux
      - cli-build-linux
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TARGET_REF }}
          sparse-checkout: |
            scripts/install-cli.sh
          sparse-checkout-cone-mode: false

      - name: Download desktop artifact
        uses: actions/download-artifact@v8
        with:
          name: desktop-linux-arm64
          path: artifacts/desktop-linux-arm64

      - name: Download CLI artifact
        uses: actions/download-artifact@v8
        with:
          name: cli-linux-arm64
          path: artifacts/cli-linux-arm64

      - name: Copy install script
        run: cp scripts/install-cli.sh artifacts/install.sh

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || inputs.ref }}
          files: artifacts/**/*
