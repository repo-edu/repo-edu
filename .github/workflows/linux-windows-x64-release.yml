name: Release x64 Linux + Windows

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.2.3, must already exist)"
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

concurrency:
  group: linux-windows-x64-release-${{ inputs.tag }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  secrets-preflight:
    name: secrets-preflight
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Validate required secrets
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing_secrets=()
          for secret_name in WIN_CSC_LINK WIN_CSC_KEY_PASSWORD; do
            if [ -z "${!secret_name:-}" ]; then
              echo "::error::Missing required secret: ${secret_name}"
              missing_secrets+=("${secret_name}")
            fi
          done
          if [ "${#missing_secrets[@]}" -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing_secrets[*]}"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Desktop packaging
  # ---------------------------------------------------------------------------
  desktop-package-linux:
    name: desktop-package (Linux)
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - uses: ./.github/actions/setup
      - name: Cache Electron artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-electron-
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Build
        run: pnpm build
      - name: Runtime validation
        run: xvfb-run -a pnpm test:runtime
      - name: Generate desktop notices
        run: pnpm --filter @repo-edu/release license-gate --app desktop --platform linux-x64 --artifact-targets deb --manifest-out apps/desktop/release-notices/RepoEdu-third-party-notices-desktop-linux-x64.txt
      - name: Package
        run: pnpm --filter @repo-edu/desktop exec electron-builder --config electron-builder.json --linux AppImage deb --x64 --publish never
      - name: Prune Linux update feed to deb
        run: pnpm --filter @repo-edu/release linux-feed-prune --release-dir apps/desktop/release
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-linux-x64
          path: |
            apps/desktop/release/*.deb
            apps/desktop/release/*-linux.yml
            apps/desktop/release-notices/*.txt
          retention-days: 30

  desktop-package-windows:
    name: desktop-package (Windows)
    needs: secrets-preflight
    runs-on: windows-latest
    environment: release
    env:
      TAG: ${{ inputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - uses: ./.github/actions/setup
      - name: Cache Electron artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-electron-
      - name: Build
        run: pnpm build
      - name: Runtime validation
        run: pnpm test:runtime
      - name: Generate desktop notices
        run: pnpm --filter @repo-edu/release license-gate --app desktop --platform windows-x64 --artifact-targets nsis --manifest-out apps/desktop/release-notices/RepoEdu-third-party-notices-desktop-windows-x64.txt
      - name: Package
        run: pnpm --filter @repo-edu/desktop exec electron-builder --config electron-builder.json --win nsis --x64 --publish never
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
      - name: Rename update metadata for Windows x64
        run: mv apps/desktop/release/latest.yml apps/desktop/release/latest-windows.yml
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-windows-x64
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest-windows.yml
            apps/desktop/release-notices/*.txt
          retention-days: 30

  # ---------------------------------------------------------------------------
  # CLI binary builds (x64 only)
  # ---------------------------------------------------------------------------
  cli-build-linux:
    name: cli-build (linux-x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - uses: ./.github/actions/setup

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Build CLI workspace dependencies
        run: pnpm build:types

      - name: Compile CLI binary
        run: |
          pnpm exec bun build --compile \
            apps/cli/src/main.ts \
            --outfile redu-linux-x64

      - name: Smoke test
        run: ./redu-linux-x64 --version

      - name: Generate CLI notices
        run: pnpm --filter @repo-edu/release license-gate --app cli --platform linux-x64 --artifact-targets binary --manifest-out redu-linux-x64.third-party-notices.txt

      - name: Generate CLI checksum
        run: |
          node -e '
            const { createHash } = require("node:crypto")
            const { readFileSync, writeFileSync } = require("node:fs")
            const paths = process.argv.slice(1)
            const lines = paths.map((path) => {
              const digest = createHash("sha256")
                .update(readFileSync(path))
                .digest("hex")
              return `${digest}  ${path}\n`
            })
            writeFileSync(`${paths[0]}.sha256`, lines.join(""))
          ' redu-linux-x64 redu-linux-x64.third-party-notices.txt

      - name: Upload CLI binary
        uses: actions/upload-artifact@v7
        with:
          name: cli-linux-x64
          path: |
            redu-linux-x64
            redu-linux-x64.sha256
            redu-linux-x64.third-party-notices.txt
          retention-days: 30

  cli-build-windows:
    name: cli-build (windows-x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - uses: ./.github/actions/setup

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Build CLI workspace dependencies
        run: pnpm build:types

      - name: Compile CLI binary
        run: |
          pnpm exec bun build --compile `
            apps/cli/src/main.ts `
            --outfile redu-windows-x64.exe

      - name: Smoke test
        run: .\redu-windows-x64.exe --version

      - name: Generate CLI notices
        run: pnpm --filter @repo-edu/release license-gate --app cli --platform windows-x64 --artifact-targets binary --manifest-out redu-windows-x64.exe.third-party-notices.txt

      - name: Generate CLI checksum
        shell: bash
        run: |
          node -e '
            const { createHash } = require("node:crypto")
            const { readFileSync, writeFileSync } = require("node:fs")
            const paths = process.argv.slice(1)
            const lines = paths.map((path) => {
              const digest = createHash("sha256")
                .update(readFileSync(path))
                .digest("hex")
              return `${digest}  ${path}\n`
            })
            writeFileSync(`${paths[0]}.sha256`, lines.join(""))
          ' redu-windows-x64.exe redu-windows-x64.exe.third-party-notices.txt

      - name: Upload CLI binary
        uses: actions/upload-artifact@v7
        with:
          name: cli-windows-x64
          path: |
            redu-windows-x64.exe
            redu-windows-x64.exe.sha256
            redu-windows-x64.exe.third-party-notices.txt
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Attach all artifacts to GitHub Release
  # ---------------------------------------------------------------------------
  release-attach:
    name: release-attach
    needs:
      - desktop-package-linux
      - desktop-package-windows
      - cli-build-linux
      - cli-build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
          sparse-checkout: |
            scripts/install-cli.sh
            scripts/install-cli.ps1
          sparse-checkout-cone-mode: false

      - name: Download desktop Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: desktop-linux-x64
          path: artifacts/desktop-linux-x64

      - name: Download desktop Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: desktop-windows-x64
          path: artifacts/desktop-windows-x64

      - name: Download CLI Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: cli-linux-x64
          path: artifacts/cli-linux-x64

      - name: Download CLI Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: cli-windows-x64
          path: artifacts/cli-windows-x64

      - name: Copy install scripts
        run: |
          cp scripts/install-cli.sh artifacts/install.sh
          cp scripts/install-cli.ps1 artifacts/install.ps1

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          files: artifacts/**/*
