name: CI

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to validate (default: current ref)"
        required: false
        type: string
  workflow_call:
    inputs:
      ref:
        description: "Branch, tag, or SHA to validate (default: caller ref)"
        required: false
        type: string

concurrency:
  group: ci-${{ github.event_name }}-${{ inputs.ref || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TARGET_REF: ${{ inputs.ref || github.ref }}

jobs:
  validate:
    name: validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TARGET_REF }}

      - uses: ./.github/actions/setup

      - name: Format check
        run: pnpm fmt:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build types
        run: pnpm build:types

      - name: Check fixtures
        run: pnpm check:fixtures

      - name: Check architecture
        run: pnpm check:architecture

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Runtime validation (macOS)
        if: runner.os == 'macOS'
        run: pnpm --filter @repo-edu/desktop run validate:runtime:prebuilt

      - name: Runtime validation (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y xvfb
          xvfb-run -a pnpm --filter @repo-edu/desktop run validate:runtime:prebuilt
