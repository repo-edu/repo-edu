name: CI

on:
  push:
    branches:
      - "renovate/**"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to validate (default: current ref)"
        required: false
        type: string
  workflow_call:
    inputs:
      ref:
        description: "Branch, tag, or SHA to validate (default: caller ref)"
        required: false
        type: string

concurrency:
  group: ci-${{ github.event_name }}-${{ inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  linux-x64:
    uses: ./.github/workflows/ci-linux-x64.yml
    with:
      ref: ${{ inputs.ref || github.ref }}

  linux-arm64:
    uses: ./.github/workflows/ci-linux-arm64.yml
    with:
      ref: ${{ inputs.ref || github.ref }}

  macos-arm64:
    uses: ./.github/workflows/ci-macos-arm64.yml
    with:
      ref: ${{ inputs.ref || github.ref }}

  windows-x64:
    uses: ./.github/workflows/ci-windows-x64.yml
    with:
      ref: ${{ inputs.ref || github.ref }}

  windows-arm64:
    uses: ./.github/workflows/ci-windows-arm64.yml
    with:
      ref: ${{ inputs.ref || github.ref }}
