name: CI x64 Linux

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to validate (default: current ref)"
        required: false
        type: string
  workflow_call:
    inputs:
      ref:
        description: "Branch, tag, or SHA to validate (default: caller ref)"
        required: false
        type: string

concurrency:
  group: ci-linux-x64-${{ github.event_name }}-${{ inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    uses: ./.github/workflows/ci-platform.yml
    with:
      ref: ${{ inputs.ref || github.ref }}
      runner: ubuntu-latest
      platform: linux-x64
      runtime_validation: linux-xvfb
