name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.2.3, must already exist)"
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate-tag:
    name: validate-tag
    runs-on: ubuntu-latest
    steps:
      - name: Fail if tag does not exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          api="https://api.github.com/repos/${{ github.repository }}/git/ref/tags/${{ inputs.tag }}"
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$api" >/dev/null

  ci:
    needs: validate-tag
    uses: ./.github/workflows/ci.yml
    with:
      ref: ${{ inputs.tag }}

  macos-arm64:
    needs: ci
    uses: ./.github/workflows/macos-arm64-release.yml
    with:
      tag: ${{ inputs.tag }}
    secrets: inherit

  linux-arm64:
    needs: ci
    uses: ./.github/workflows/linux-arm64-release.yml
    with:
      tag: ${{ inputs.tag }}
    secrets: inherit

  windows-arm64:
    needs: ci
    uses: ./.github/workflows/windows-arm64-release.yml
    with:
      tag: ${{ inputs.tag }}
    secrets: inherit

  linux-windows-x64:
    needs: ci
    uses: ./.github/workflows/linux-windows-x64-release.yml
    with:
      tag: ${{ inputs.tag }}
    secrets: inherit