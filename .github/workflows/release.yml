name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.2.3, must already exist)"
        required: true
        type: string

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate-tag:
    name: validate-tag
    runs-on: ubuntu-latest
    steps:
      - name: Fail if tag does not exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api repos/${{ github.repository }}/git/ref/tags/${{ inputs.tag }} --silent

  ci:
    needs: validate-tag
    uses: ./.github/workflows/ci.yml
    with:
      ref: ${{ inputs.tag }}

  create-release:
    name: create-release
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists in $REPO; skipping create."
          else
            COMMIT_SHA="$(git rev-list -n 1 "$TAG")"
            COMMIT_SUBJECT="$(git show -s --format=%s "$COMMIT_SHA")"
            COMMIT_URL="https://github.com/$REPO/commit/$COMMIT_SHA"

            printf -- "- [%s](%s)\n" "$COMMIT_SUBJECT" "$COMMIT_URL" > release-notes.md

            gh release create "$TAG" --repo "$REPO" --notes-file release-notes.md
          fi

  macos-arm64:
    needs: create-release
    permissions:
      contents: write
    uses: ./.github/workflows/macos-arm64-release.yml
    with:
      tag: ${{ inputs.tag }}
    secrets: inherit

  linux-arm64:
    needs: create-release
    permissions:
      contents: write
    uses: ./.github/workflows/linux-arm64-release.yml
    with:
      tag: ${{ inputs.tag }}
    secrets: inherit

  windows-arm64:
    needs: create-release
    permissions:
      contents: write
    uses: ./.github/workflows/windows-arm64-release.yml
    with:
      tag: ${{ inputs.tag }}
    secrets: inherit

  linux-windows-x64:
    needs: create-release
    permissions:
      contents: write
    uses: ./.github/workflows/linux-windows-x64-release.yml
    with:
      tag: ${{ inputs.tag }}
    secrets: inherit
