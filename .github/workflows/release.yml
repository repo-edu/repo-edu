name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.2.3, must already exist)"
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate-tag:
    name: validate-tag
    runs-on: ubuntu-latest
    steps:
      - name: Fail if tag does not exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          api="https://api.github.com/repos/${{ github.repository }}/git/ref/tags/${{ inputs.tag }}"
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$api" >/dev/null

  ci:
    needs: validate-tag
    uses: ./.github/workflows/ci.yml
    with:
      ref: ${{ inputs.tag }}

  # ---------------------------------------------------------------------------
  # Desktop packaging (per-platform)
  # ---------------------------------------------------------------------------
  desktop-package-macos:
    name: desktop-package (macOS)
    needs: ci
    runs-on: macos-latest
    env:
      TAG: ${{ inputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - uses: ./.github/actions/setup
      - name: Cache Electron artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-electron-
      - name: Build
        run: pnpm build
      - name: Runtime validation
        run: pnpm test:runtime
      - name: Package
        run: pnpm --filter @repo-edu/desktop run package:ci:macos
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: desktop-macOS
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest-mac.yml
          retention-days: 30

  desktop-package-linux:
    name: desktop-package (Linux)
    needs: ci
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - uses: ./.github/actions/setup
      - name: Cache Electron artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-electron-
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Build
        run: pnpm build
      - name: Runtime validation
        run: xvfb-run -a pnpm test:runtime
      - name: Package
        run: pnpm --filter @repo-edu/desktop run package:ci:linux
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: desktop-Linux
          path: |
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest-linux.yml
          retention-days: 30

  desktop-package-windows:
    name: desktop-package (Windows)
    needs: ci
    runs-on: windows-latest
    env:
      TAG: ${{ inputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - uses: ./.github/actions/setup
      - name: Cache Electron artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-electron-
      - name: Build
        run: pnpm build
      - name: Runtime validation
        run: pnpm test:runtime
      - name: Package
        run: pnpm --filter @repo-edu/desktop run package:ci:windows
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: desktop-Windows
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest.yml
          retention-days: 30

  # ---------------------------------------------------------------------------
  # CLI binary builds (cross-platform)
  # ---------------------------------------------------------------------------
  cli-build:
    name: cli-build (${{ matrix.target }})
    needs: ci
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-latest
            bun_target: bun-darwin-arm64
            sign: true
          - target: linux-x64
            runner: ubuntu-latest
            bun_target: bun-linux-x64
            sign: false
          - target: linux-arm64
            runner: ubuntu-latest
            bun_target: bun-linux-arm64
            sign: false
            cross_compile: true
          - target: windows-x64
            runner: windows-latest
            bun_target: bun-windows-x64
            sign: false
          - target: windows-arm64
            runner: windows-latest
            bun_target: bun-windows-arm64
            sign: false
            cross_compile: true

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - uses: ./.github/actions/setup

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build CLI workspace dependencies
        run: pnpm -r --filter @repo-edu/cli... run build

      - name: Compile CLI binary
        shell: bash
        run: |
          ext=""
          if [[ "${{ matrix.target }}" == windows-* ]]; then ext=".exe"; fi
          pnpm exec bun build --compile \
            --target=${{ matrix.bun_target }} \
            apps/cli/src/main.ts \
            --outfile "redu-${{ matrix.target }}${ext}"

      - name: Smoke test
        if: ${{ !matrix.cross_compile }}
        shell: bash
        run: |
          ext=""
          if [[ "${{ matrix.target }}" == windows-* ]]; then ext=".exe"; fi
          "./redu-${{ matrix.target }}${ext}" --version

      - name: Sign and notarize (macOS)
        if: matrix.sign
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Decode signing certificate
          CERT_PATH=$(mktemp)
          echo "$CSC_LINK" | base64 --decode > "$CERT_PATH"
          KEYCHAIN_PATH=$(mktemp -d)/build.keychain
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"

          # Sign binary with hardened runtime
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | head -1 | sed 's/.*"\(.*\)"/\1/')
          codesign --force --options runtime --sign "$IDENTITY" "redu-${{ matrix.target }}"

          # Notarize
          zip "redu-${{ matrix.target }}.zip" "redu-${{ matrix.target }}"
          xcrun notarytool submit "redu-${{ matrix.target }}.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          rm "redu-${{ matrix.target }}.zip"

          # Clean up keychain
          security delete-keychain "$KEYCHAIN_PATH"

      - name: Generate CLI checksum
        shell: bash
        run: |
          ext=""
          if [[ "${{ matrix.target }}" == windows-* ]]; then ext=".exe"; fi
          artifact="redu-${{ matrix.target }}${ext}"
          node -e '
            const { createHash } = require("node:crypto")
            const { readFileSync, writeFileSync } = require("node:fs")
            const path = process.argv[1]
            const digest = createHash("sha256")
              .update(readFileSync(path))
              .digest("hex")
            writeFileSync(`${path}.sha256`, `${digest}  ${path}\n`)
          ' "$artifact"

      - name: Upload CLI binary
        uses: actions/upload-artifact@v6
        with:
          name: cli-${{ matrix.target }}
          path: redu-${{ matrix.target }}*
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Attach all artifacts to GitHub Release
  # ---------------------------------------------------------------------------
  release-attach:
    name: release-attach
    needs:
      - desktop-package-macos
      - desktop-package-linux
      - desktop-package-windows
      - cli-build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
          sparse-checkout: |
            scripts/install-cli.sh
            scripts/install-cli.ps1
          sparse-checkout-cone-mode: false

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Copy install scripts
        run: |
          cp scripts/install-cli.sh artifacts/install.sh
          cp scripts/install-cli.ps1 artifacts/install.ps1

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          generate_release_notes: true
          files: artifacts/**/*
