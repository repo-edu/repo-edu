name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.2.3, must already exist)"
        required: true
        type: string

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate-tag:
    name: validate-tag
    runs-on: ubuntu-latest
    steps:
      - name: Fail if tag does not exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api repos/${{ github.repository }}/git/ref/tags/${{ inputs.tag }} --silent

  secrets-preflight-macos-arm64:
    name: secrets-preflight (macos-arm64)
    runs-on: ubuntu-latest
    needs: validate-tag
    steps:
      - name: Validate required secrets
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          FEED_REPO_TOKEN: ${{ secrets.FEED_REPO_TOKEN }}
        run: |
          set -euo pipefail
          for secret_name in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID FEED_REPO_TOKEN; do
            if [ -z "${!secret_name:-}" ]; then
              echo "::error::Missing required secret: ${secret_name}"
              exit 1
            fi
          done

      - name: Validate arm64 feed repo write access
        env:
          GH_TOKEN: ${{ secrets.FEED_REPO_TOKEN }}
        run: |
          set -euo pipefail
          FEED_REPO="repo-edu/repo-edu-updates-arm64"
          API_URL="https://api.github.com/repos/${FEED_REPO}/releases"

          # Probe release-write permission without creating any release assets.
          status_code="$(
            curl -sS -o /tmp/feed-release-probe.json -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              "$API_URL" \
              -d '{}'
          )"

          if [ "$status_code" = "401" ] || [ "$status_code" = "403" ] || [ "$status_code" = "404" ]; then
            echo "::error::FEED_REPO_TOKEN lacks Contents:write on ${FEED_REPO}"
            cat /tmp/feed-release-probe.json
            exit 1
          fi

          if [ "$status_code" != "422" ]; then
            echo "::error::Unexpected response while validating FEED_REPO_TOKEN write access (HTTP ${status_code})"
            cat /tmp/feed-release-probe.json
            exit 1
          fi

  secrets-preflight-linux-arm64:
    name: secrets-preflight (linux-arm64)
    runs-on: ubuntu-latest
    needs: validate-tag
    steps:
      - name: Validate required secrets
        env:
          FEED_REPO_TOKEN: ${{ secrets.FEED_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${FEED_REPO_TOKEN:-}" ]; then
            echo "::error::Missing required secret: FEED_REPO_TOKEN"
            exit 1
          fi

      - name: Validate arm64 feed repo write access
        env:
          GH_TOKEN: ${{ secrets.FEED_REPO_TOKEN }}
        run: |
          set -euo pipefail
          FEED_REPO="repo-edu/repo-edu-updates-arm64"
          API_URL="https://api.github.com/repos/${FEED_REPO}/releases"

          # Probe release-write permission without creating any release assets.
          status_code="$(
            curl -sS -o /tmp/feed-release-probe.json -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              "$API_URL" \
              -d '{}'
          )"

          if [ "$status_code" = "401" ] || [ "$status_code" = "403" ] || [ "$status_code" = "404" ]; then
            echo "::error::FEED_REPO_TOKEN lacks Contents:write on ${FEED_REPO}"
            cat /tmp/feed-release-probe.json
            exit 1
          fi

          if [ "$status_code" != "422" ]; then
            echo "::error::Unexpected response while validating FEED_REPO_TOKEN write access (HTTP ${status_code})"
            cat /tmp/feed-release-probe.json
            exit 1
          fi

  secrets-preflight-windows-arm64:
    name: secrets-preflight (windows-arm64)
    runs-on: ubuntu-latest
    needs: validate-tag
    steps:
      - name: Validate required secrets
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          FEED_REPO_TOKEN: ${{ secrets.FEED_REPO_TOKEN }}
        run: |
          set -euo pipefail
          for secret_name in WIN_CSC_LINK WIN_CSC_KEY_PASSWORD FEED_REPO_TOKEN; do
            if [ -z "${!secret_name:-}" ]; then
              echo "::error::Missing required secret: ${secret_name}"
              exit 1
            fi
          done

      - name: Validate arm64 feed repo write access
        env:
          GH_TOKEN: ${{ secrets.FEED_REPO_TOKEN }}
        run: |
          set -euo pipefail
          FEED_REPO="repo-edu/repo-edu-updates-arm64"
          API_URL="https://api.github.com/repos/${FEED_REPO}/releases"

          # Probe release-write permission without creating any release assets.
          status_code="$(
            curl -sS -o /tmp/feed-release-probe.json -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              "$API_URL" \
              -d '{}'
          )"

          if [ "$status_code" = "401" ] || [ "$status_code" = "403" ] || [ "$status_code" = "404" ]; then
            echo "::error::FEED_REPO_TOKEN lacks Contents:write on ${FEED_REPO}"
            cat /tmp/feed-release-probe.json
            exit 1
          fi

          if [ "$status_code" != "422" ]; then
            echo "::error::Unexpected response while validating FEED_REPO_TOKEN write access (HTTP ${status_code})"
            cat /tmp/feed-release-probe.json
            exit 1
          fi

  secrets-preflight-linux-windows-x64:
    name: secrets-preflight (linux-windows-x64)
    runs-on: ubuntu-latest
    needs: validate-tag
    steps:
      - name: Validate required secrets
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for secret_name in WIN_CSC_LINK WIN_CSC_KEY_PASSWORD; do
            if [ -z "${!secret_name:-}" ]; then
              echo "::error::Missing required secret: ${secret_name}"
              exit 1
            fi
          done

  ci:
    needs: validate-tag
    uses: ./.github/workflows/ci.yml
    with:
      ref: ${{ inputs.tag }}

  create-release:
    name: create-release
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists in $REPO; skipping create."
          else
            gh release create "$TAG" --repo "$REPO" --generate-notes
          fi

  macos-arm64:
    needs:
      - create-release
      - secrets-preflight-macos-arm64
    uses: ./.github/workflows/macos-arm64-release.yml
    with:
      tag: ${{ inputs.tag }}
    secrets: inherit

  linux-arm64:
    needs:
      - create-release
      - secrets-preflight-linux-arm64
    uses: ./.github/workflows/linux-arm64-release.yml
    with:
      tag: ${{ inputs.tag }}
    secrets: inherit

  windows-arm64:
    needs:
      - create-release
      - secrets-preflight-windows-arm64
    uses: ./.github/workflows/windows-arm64-release.yml
    with:
      tag: ${{ inputs.tag }}
    secrets: inherit

  linux-windows-x64:
    needs:
      - create-release
      - secrets-preflight-linux-windows-x64
    uses: ./.github/workflows/linux-windows-x64-release.yml
    with:
      tag: ${{ inputs.tag }}
    secrets: inherit
