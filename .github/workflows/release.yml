name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.2.3, must already exist)"
        required: true
        type: string

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate-tag:
    name: validate-tag
    runs-on: ubuntu-latest
    steps:
      - name: Fail if tag does not exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api repos/${{ github.repository }}/git/ref/tags/${{ inputs.tag }} --silent

  ci:
    needs: validate-tag
    uses: ./.github/workflows/ci.yml
    with:
      ref: ${{ inputs.tag }}

  create-release:
    name: create-release
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists in $REPO; skipping create."
          else
            gh release create "$TAG" --repo "$REPO" --generate-notes
          fi

  macos-arm64:
    needs: create-release
    uses: ./.github/workflows/macos-arm64-release.yml
    with:
      tag: ${{ inputs.tag }}
    secrets: inherit

  linux-arm64:
    needs: create-release
    uses: ./.github/workflows/linux-arm64-release.yml
    with:
      tag: ${{ inputs.tag }}
    secrets: inherit

  windows-arm64:
    needs: create-release
    uses: ./.github/workflows/windows-arm64-release.yml
    with:
      tag: ${{ inputs.tag }}
    secrets: inherit

  linux-windows-x64:
    needs: create-release
    uses: ./.github/workflows/linux-windows-x64-release.yml
    with:
      tag: ${{ inputs.tag }}
    secrets: inherit
