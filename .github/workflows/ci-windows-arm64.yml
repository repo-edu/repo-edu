name: CI arm64 Windows

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to validate (default: current ref)"
        required: false
        type: string
  workflow_call:
    inputs:
      ref:
        description: "Branch, tag, or SHA to validate (default: caller ref)"
        required: false
        type: string

concurrency:
  group: ci-windows-arm64-${{ github.event_name }}-${{ inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    uses: ./.github/workflows/ci-platform.yml
    with:
      ref: ${{ inputs.ref || github.ref }}
      runner: windows-11-arm
      platform: windows-arm64
      format_check: false
      runtime_validation: plain
