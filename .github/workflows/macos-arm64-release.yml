name: Release arm64 macOS

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.2.3, must already exist)"
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

concurrency:
  group: macos-release-${{ inputs.tag }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  secrets-preflight:
    name: secrets-preflight
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Validate required secrets
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          missing_secrets=()
          for secret_name in CSC_LINK CSC_KEY_PASSWORD APPLE_API_KEY APPLE_API_KEY_ID APPLE_API_ISSUER; do
            if [ -z "${!secret_name:-}" ]; then
              echo "::error::Missing required secret: ${secret_name}"
              missing_secrets+=("${secret_name}")
            fi
          done
          if [ "${#missing_secrets[@]}" -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing_secrets[*]}"
            exit 1
          fi

  desktop-package-macos:
    name: desktop-package (macOS)
    needs: secrets-preflight
    runs-on: macos-26
    environment: release
    env:
      TAG: ${{ inputs.tag }}
      MACOS_SIGNING_SESSION_FILE: repo-edu-desktop-macos-signing-session.json
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - uses: ./.github/actions/setup
      - name: Assert arm64 runner
        run: test "$(uname -m)" = "arm64"
      - name: Cache Electron artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-electron-
      - name: Build
        run: pnpm build
      - name: Runtime validation
        run: pnpm test:runtime
      - name: Generate desktop notices
        run: pnpm --filter @repo-edu/release license-gate --app desktop --platform darwin-arm64 --artifact-targets dmg,zip --manifest-out apps/desktop/release-notices/RepoEdu-third-party-notices-desktop-darwin-arm64.txt
      - name: Prepare macOS signing
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: pnpm --filter @repo-edu/release macos-signing:prepare --manifest "$RUNNER_TEMP/$MACOS_SIGNING_SESSION_FILE"
      - name: Package
        run: NODE_OPTIONS=--no-deprecation pnpm --filter @repo-edu/desktop exec electron-builder --config electron-builder.json --mac dmg zip --arm64 --publish never
      - name: Cleanup macOS signing
        if: always()
        run: pnpm --filter @repo-edu/release macos-signing:cleanup --manifest "$RUNNER_TEMP/$MACOS_SIGNING_SESSION_FILE"
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-macos-arm64
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest-mac.yml
            apps/desktop/release-notices/*.txt
          retention-days: 30

  cli-build-macos:
    name: cli-build (darwin-arm64)
    needs: secrets-preflight
    runs-on: macos-26
    environment: release
    env:
      MACOS_SIGNING_SESSION_FILE: repo-edu-cli-macos-signing-session.json
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - uses: ./.github/actions/setup

      - name: Assert arm64 runner
        run: test "$(uname -m)" = "arm64"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Build CLI workspace dependencies
        run: pnpm build:types

      - name: Compile CLI binary
        run: |
          pnpm exec bun build --compile \
            --target=bun-darwin-arm64 \
            apps/cli/src/main.ts \
            --outfile redu-darwin-arm64

      - name: Generate CLI notices
        run: pnpm --filter @repo-edu/release license-gate --app cli --platform darwin-arm64 --artifact-targets binary --manifest-out redu-darwin-arm64.third-party-notices.txt

      - name: Prepare macOS signing
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: pnpm --filter @repo-edu/release macos-signing:prepare --manifest "$RUNNER_TEMP/$MACOS_SIGNING_SESSION_FILE"

      - name: Sign and notarize
        run: |
          codesign --force --options runtime --sign "$MACOS_SIGNING_IDENTITY" redu-darwin-arm64
          zip redu-darwin-arm64.zip redu-darwin-arm64
          xcrun notarytool submit redu-darwin-arm64.zip \
            --key "$APPLE_API_KEY" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait
          rm redu-darwin-arm64.zip

      - name: Cleanup macOS signing
        if: always()
        run: pnpm --filter @repo-edu/release macos-signing:cleanup --manifest "$RUNNER_TEMP/$MACOS_SIGNING_SESSION_FILE"

      - name: Generate CLI checksum
        run: |
          node -e '
            const { createHash } = require("node:crypto")
            const { readFileSync, writeFileSync } = require("node:fs")
            const paths = process.argv.slice(1)
            const lines = paths.map((path) => {
              const digest = createHash("sha256")
                .update(readFileSync(path))
                .digest("hex")
              return `${digest}  ${path}\n`
            })
            writeFileSync(`${paths[0]}.sha256`, lines.join(""))
          ' redu-darwin-arm64 redu-darwin-arm64.third-party-notices.txt

      - name: Upload CLI binary
        uses: actions/upload-artifact@v7
        with:
          name: cli-darwin-arm64
          path: |
            redu-darwin-arm64
            redu-darwin-arm64.sha256
            redu-darwin-arm64.third-party-notices.txt
          retention-days: 30

  release-attach:
    name: release-attach
    needs:
      - desktop-package-macos
      - cli-build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
          sparse-checkout: |
            scripts/install-cli.sh
          sparse-checkout-cone-mode: false

      - name: Download desktop artifact
        uses: actions/download-artifact@v8
        with:
          name: desktop-macos-arm64
          path: artifacts/desktop-macos-arm64

      - name: Download CLI artifact
        uses: actions/download-artifact@v8
        with:
          name: cli-darwin-arm64
          path: artifacts/cli-darwin-arm64

      - name: Copy install script
        run: cp scripts/install-cli.sh artifacts/install.sh

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          files: artifacts/**/*
