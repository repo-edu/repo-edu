name: Release arm64 macOS

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.2.3, must already exist)"
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

concurrency:
  group: macos-release-${{ inputs.tag }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  desktop-package-macos:
    name: desktop-package (macOS)
    runs-on: macos-15
    env:
      TAG: ${{ inputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - uses: ./.github/actions/setup
      - name: Assert arm64 runner
        run: test "$(uname -m)" = "arm64"
      - name: Cache Electron artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-electron-
      - name: Build
        run: pnpm build
      - name: Runtime validation
        run: pnpm test:runtime
      - name: Package
        run: NODE_OPTIONS=--no-deprecation pnpm --filter @repo-edu/desktop exec electron-builder --config electron-builder.json --mac dmg zip --arm64 --publish never
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: desktop-macOS
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest-mac.yml
          retention-days: 30

  cli-build-macos:
    name: cli-build (darwin-arm64)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - uses: ./.github/actions/setup

      - name: Assert arm64 runner
        run: test "$(uname -m)" = "arm64"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Build CLI workspace dependencies
        run: pnpm -r --filter @repo-edu/cli... run build

      - name: Compile CLI binary
        run: |
          pnpm exec bun build --compile \
            --target=bun-darwin-arm64 \
            apps/cli/src/main.ts \
            --outfile redu-darwin-arm64

      - name: Sign and notarize
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Decode signing certificate
          CERT_PATH=$(mktemp)
          echo "$CSC_LINK" | base64 --decode > "$CERT_PATH"
          KEYCHAIN_PATH=$(mktemp -d)/build.keychain
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"

          # Sign binary with hardened runtime
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | head -1 | sed 's/.*"\(.*\)"/\1/')
          codesign --force --options runtime --sign "$IDENTITY" redu-darwin-arm64

          # Notarize
          zip redu-darwin-arm64.zip redu-darwin-arm64
          xcrun notarytool submit redu-darwin-arm64.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          rm redu-darwin-arm64.zip

          # Clean up keychain
          security delete-keychain "$KEYCHAIN_PATH"

      - name: Generate CLI checksum
        run: |
          node -e '
            const { createHash } = require("node:crypto")
            const { readFileSync, writeFileSync } = require("node:fs")
            const path = process.argv[1]
            const digest = createHash("sha256")
              .update(readFileSync(path))
              .digest("hex")
            writeFileSync(`${path}.sha256`, `${digest}  ${path}\n`)
          ' redu-darwin-arm64

      - name: Upload CLI binary
        uses: actions/upload-artifact@v6
        with:
          name: cli-darwin-arm64
          path: redu-darwin-arm64*
          retention-days: 30

  release-attach:
    name: release-attach
    needs:
      - desktop-package-macos
      - cli-build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
          sparse-checkout: |
            scripts/install-cli.sh
          sparse-checkout-cone-mode: false

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Copy install script
        run: cp scripts/install-cli.sh artifacts/install.sh

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: artifacts/**/*

      - name: Publish to arm64 update feed
        uses: softprops/action-gh-release@v2
        with:
          repository: repo-edu/repo-edu-updates-arm64
          token: ${{ secrets.FEED_REPO_TOKEN }}
          tag_name: ${{ inputs.tag }}
          files: artifacts/desktop-macOS/**/*
