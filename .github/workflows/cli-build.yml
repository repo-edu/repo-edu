name: CLI Build

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to build (default: current ref)"
        required: false
        type: string

concurrency:
  group: cli-build-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TARGET_REF: ${{ inputs.ref != '' && inputs.ref || github.ref }}

jobs:
  cli-build:
    name: cli-build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TARGET_REF }}

      - uses: pnpm/action-setup@v4
        with:
          version: "10"

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build CLI and workspace dependencies
        run: pnpm -r --filter @repo-edu/cli... run build

      - name: Upload CLI build artifact
        uses: actions/upload-artifact@v6
        with:
          name: cli-${{ runner.os }}
          path: apps/cli/dist/*
          retention-days: 30
