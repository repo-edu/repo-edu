name: CI arm64 Linux

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to validate (default: current ref)"
        required: false
        type: string
  workflow_call:
    inputs:
      ref:
        description: "Branch, tag, or SHA to validate (default: caller ref)"
        required: false
        type: string

concurrency:
  group: ci-linux-arm64-${{ github.event_name }}-${{ inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    uses: ./.github/workflows/ci-platform.yml
    with:
      ref: ${{ inputs.ref || github.ref }}
      runner: ubuntu-24.04-arm
      platform: linux-arm64
      runtime_validation: linux-xvfb
