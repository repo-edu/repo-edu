name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.2.3, must already exist)"
        required: true
        type: string

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  precheck:
    name: precheck
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Fail if tag does not exist (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          api="https://api.github.com/repos/${{ github.repository }}/git/ref/tags/${{ inputs.tag }}"
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$api" >/dev/null

      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG }}

      - uses: pnpm/action-setup@v4
        with:
          version: "10"

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Validate
        run: pnpm check && pnpm test:workspace

  desktop-package:
    name: desktop-package (${{ matrix.os }})
    needs: precheck
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    env:
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG }}

      - uses: pnpm/action-setup@v4
        with:
          version: "10"

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - name: Cache Electron artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-electron-
        if: runner.os != 'Windows'

      - name: Cache Electron artifacts (Windows)
        uses: actions/cache@v5
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-electron-
        if: runner.os == 'Windows'

      - run: pnpm install --frozen-lockfile

      - name: Install xvfb (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Build
        run: pnpm build

      - name: Runtime validation (macOS)
        if: runner.os == 'macOS'
        run: pnpm test:runtime

      - name: Runtime validation (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a pnpm test:runtime

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: pnpm --filter @repo-edu/desktop run package:ci:macos
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: pnpm --filter @repo-edu/desktop run package:ci:linux

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: pnpm --filter @repo-edu/desktop run package:ci:windows
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: desktop-${{ runner.os }}
          path: apps/desktop/release/*
          retention-days: 30

  release-attach:
    name: release-attach
    needs: desktop-package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          generate_release_notes: true
          files: artifacts/**/*
