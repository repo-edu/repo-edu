name: Setup
description: Install pnpm + Node and install dependencies

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4

    - uses: actions/setup-node@v6
      with:
        node-version: "24"
        cache: pnpm

    - name: Install dependencies
      run: pnpm install --frozen-lockfile && pnpm rebuild electron
      shell: bash
