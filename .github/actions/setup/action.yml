name: Setup
description: Install pnpm + Node and install dependencies

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
      with:
        version: "10"

    - uses: actions/setup-node@v6
      with:
        node-version: "24"
        cache: pnpm

    - run: pnpm install --frozen-lockfile
      shell: bash
